# Builds and deploys the Alizarin documentation site to GitHub Pages.
# Docs content is fetched from the main alizarin repo via sparse checkout.
#
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]

  # Triggered by alizarin repo CI when docs/ changes on main
  repository_dispatch:
    types: [docs-updated]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch docs content from alizarin
        run: |
          git clone --depth 1 --sparse https://github.com/flaxandteal/alizarin.git /tmp/alizarin
          cd /tmp/alizarin
          git sparse-checkout set docs/
          mkdir -p ${{ github.workspace }}/content/docs
          cp -r docs/* ${{ github.workspace }}/content/docs/

      - name: Determine latest stable tag
        id: stable_tag
        run: |
          cd /tmp/alizarin
          git fetch --tags
          TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v -E '(alpha|beta|rc)' | head -1)
          echo "tag=${TAG:-}" >> $GITHUB_OUTPUT
          echo "Latest stable tag: ${TAG:-none}"

      - name: Copy example data to public
        run: |
          mkdir -p public/docs/example
          cp -r content/docs/example/* public/docs/example/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate llms.txt
        run: node scripts/generate-llms-txt.mjs

      - name: Generate API reference docs
        run: node scripts/generate-api-docs.mjs
        env:
          STABLE_TAG: ${{ steps.stable_tag.outputs.tag }}

      - name: Build with Next.js
        run: npx --no-install next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
